spring.application.name=backend

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/meetsync
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# OAuth2 Google
spring.security.oauth2.client.registration.google.client-id={CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret={CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope={CLIENT_SCOPE}
spring.security.oauth2.client.registration.google.redirect-uri={CLIENT_REDIRECT_URL}

# JWT
app.jwt.secret=your-super-secret-key-minimum-256-bits-long-random-string
app.jwt.expiry-ms=86400000
spring.docker.compose.enabled=false
# Frontend URL
app.frontend-url=http://localhost:5173

# Server
server.port=8080

